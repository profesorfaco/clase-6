<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Hola jQuery</title>
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
<style>.progress, .progress-bar{height:10rem;}</style>
</head>
<body>
<div class="container">
	<div class="row">
		<div class="col py-5">
			<select name="menu" class="mb-4" onchange="location = this.value;">
				<option value="var-0.html">introducción</option>
				<option value="var-1.html">números y letras</option>
				<option value="var-2.html" selected>arreglos</option>
				<option value="var-3.html">objetos</option>
				<option value="var-4.html">json</option>
			</select>
			<div class="progress" id="barras"></div>
		</div>
	</div>
</div>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<script>
$(document).ready(function(){
// una variable data, a la que le asigno un arreglo como contenido.
	var data = [ 40, 10, 9, 6, 35 ];
// una variable color, a la que le asigno un arreglo como contenido.
	var color = ["bg-danger","bg-warning","bg-info","bg-primary","bg-secondary"];
// un ciclo for para repetir una acción que afecta a un div de identidad barras.		
	for (var a = 0; a < data.length; a++){
		$("div#barras").append("<div class=\"progress-bar "+ color[a] + "\" role=\"progressbar\" style=\"width:"+ data[a] +"%\" aria-valuenow=\""+ data[a] +"\" aria-valuemin=\"0\" aria-valuemax=\"100\">"+ data[a] +"%</div>")
	}
});
</script>
</body>
</html>
